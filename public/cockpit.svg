<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMax meet">
  <!-- Minimal low coaming cue — 3D long nose is primary -->
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f8fa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f8f8fa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f0f0f4" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafc"/>
      <stop offset="100%" stop-color="#e8e8ee"/>
    </linearGradient>
  </defs>

  <rect x="0" y="340" width="800" height="160" fill="url(#fade)"/>
  <path d="M 0 500 L 40 420 L 200 380 L 220 500 Z" fill="url(#panel)" stroke="#2c2c32" stroke-width="1.2" opacity="0.4"/>
  <path d="M 800 500 L 760 420 L 600 380 L 580 500 Z" fill="url(#panel)" stroke="#2c2c32" stroke-width="1.2" opacity="0.4"/>
  <path d="M 360 500 L 385 420 L 400 360 L 415 420 L 440 500 Z" fill="url(#panel)" stroke="#2c2c32" stroke-width="1.1" opacity="0.35"/>

  <g id="cockpit-brake" transform="translate(250, 455)">
    <rect x="-6" y="-36" width="12" height="40" rx="2" fill="#e4e4ea" stroke="#2c2c32" stroke-width="1"/>
    <g id="cockpit-brake-arm" transform="rotate(-18)">
      <line x1="0" y1="0" x2="0" y2="-32" stroke="#2c2c32" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="-32" r="5" fill="#e8a090" stroke="#2c2c32" stroke-width="1"/>
    </g>
  </g>

  <g id="cockpit-gear" transform="translate(550, 455)">
    <rect x="-6" y="-36" width="12" height="40" rx="2" fill="#e4e4ea" stroke="#2c2c32" stroke-width="1"/>
    <g id="cockpit-gear-arm" transform="rotate(-15)">
      <line x1="0" y1="0" x2="0" y2="-32" stroke="#2c2c32" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="-32" r="5" fill="#e8a090" stroke="#2c2c32" stroke-width="1"/>
    </g>
  </g>

  <g id="cockpit-stick-base" transform="translate(400, 470)">
    <ellipse cx="0" cy="0" rx="14" ry="5" fill="#ececf0" stroke="#2c2c32" stroke-width="1"/>
    <g id="cockpit-stick">
      <line id="cockpit-stick-shaft" x1="0" y1="0" x2="0" y2="-40" stroke="#2c2c32" stroke-width="2.5" stroke-linecap="round"/>
      <rect id="cockpit-stick-grip" x="-9" y="-50" width="18" height="12" rx="2"
            fill="#e8e8ec" stroke="#2c2c32" stroke-width="1"/>
    </g>
  </g>
</svg>
